  html, body { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
  video { width: 100%; height: 100%; object-fit: contain; display: block; }
  #overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    gap: 12px;
    overflow-y: auto;
    padding: 20px;
  }
  #overlay.hidden { display: none; }
  #overlay h2 { color: #fff; font-size: 16px; margin-bottom: 8px; font-weight: 400; letter-spacing: 0.1em; }
  .vbtn {
    width: 240px;
    padding: 10px 16px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.3);
    color: #fff;
    font-size: 13px;
    cursor: pointer;
    border-radius: 3px;
    text-align: left;
    transition: background 0.15s;
  }
  .vbtn:hover { background: rgba(255,255,255,0.25); }
  .vbtn span { color: rgba(255,255,255,0.4); font-size: 11px; margin-right: 8px; }

var current = 0;
var player = document.getElementById('player');
var overlay = document.getElementById('overlay');
var preloader = document.createElement('video');
preloader.muted = true;

playlist.forEach(function(v, i) {
  var btn = document.createElement('button');
  btn.className = 'vbtn';
  btn.innerHTML = '<span>' + (i+1) + '</span>' + v.title;
  btn.onclick = function() { start(i); };
  overlay.appendChild(btn);
});

function preloadNext(idx) {
  var next = (idx + 1) % playlist.length;
  preloader.src = playlist[next].url;
  preloader.load();
}

function play(idx) {
  current = idx % playlist.length;
  player.src = playlist[current].url;
  player.load();
  player.play();
  preloadNext(current);
}

player.addEventListener('ended', function() {
  play(current + 1);
});

player.addEventListener('error', function() {
  play(current + 1);
});

function start(idx) {
  overlay.classList.add('hidden');
  play(idx);
}
