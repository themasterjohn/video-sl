<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TV</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
  video { width: 100%; height: 100%; object-fit: contain; display: block; }
</style>
</head>
<body>
<video id="player" playsinline muted autoplay></video>
<script>
var playlist = [
  "https://files.catbox.moe/s04t8v.mp4",
  "https://files.catbox.moe/imxgkr.mp4",
  "https://files.catbox.moe/3jxekf.mp4"
];
var current = 0;
var player = document.getElementById('player');

function play(idx) {
  current = idx % playlist.length;
  player.src = playlist[current];
  player.load();
  player.play();
}

player.addEventListener('ended', function() {
  play(current + 1);
});

player.addEventListener('error', function() {
  play(current + 1);
});

play(0);
</script>
</body>
</html>
