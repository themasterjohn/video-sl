<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
  video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; }
  #back-btn {
    position: absolute;
    bottom: 10px; right: 10px;
    z-index: 20;
    background: rgba(255,255,255,0.9);
    border: none;
    color: #000;
    font-size: 11px;
    padding: 6px 12px;
    cursor: pointer;
    border-radius: 3px;
    letter-spacing: 0.1em;
    font-weight: bold;
  }
  #back-btn:hover { background: #fff; }
  #overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.92);
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-y: scroll;
    padding: 20px 20px 40px;
    z-index: 10;
  }
  #overlay.hidden { display: none; }
  #overlay h2 { color: #fff; font-size: 15px; margin-bottom: 16px; margin-top: 10px; font-weight: 400; letter-spacing: 0.15em; flex-shrink: 0; }
  .vbtn {
    width: 90%;
    flex-shrink: 0;
    padding: 14px 20px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.25);
    color: #fff;
    font-size: 20px;
    cursor: pointer;
    border-radius: 3px;
    text-align: left;
    margin-bottom: 6px;
  }
  .vbtn:hover { background: rgba(255,255,255,0.2); }
  .vbtn.active { border-color: #fff; background: rgba(255,255,255,0.2); }
  .vbtn span { color: rgba(255,255,255,0.35); font-size: 11px; margin-right: 8px; }
</style>
</head>

var current = 0;
var player = document.getElementById('player');
var overlay = document.getElementById('overlay');
var buttons = [];
var preloader = document.createElement('video');
preloader.muted = true;

playlist.forEach(function(v, i) {
  var btn = document.createElement('button');
  btn.className = 'vbtn';
  btn.innerHTML = '<span>' + (i+1) + '</span>' + v.title;
  btn.onclick = function() { start(i); };
  overlay.appendChild(btn);
  buttons.push(btn);
});

function preloadNext(idx) {
  var next = (idx + 1) % playlist.length;
  preloader.src = playlist[next].url;
  preloader.load();
}

function play(idx) {
  current = idx % playlist.length;
  player.src = playlist[current].url;
  player.load();
  player.play();
  preloadNext(current);
  buttons.forEach(function(b, i) {
    b.classList.toggle('active', i === current);
  });
}

player.addEventListener('ended', function() {
  play(current + 1);
});

player.addEventListener('error', function() {
  play(current + 1);
});

function start(idx) {
  overlay.classList.add('hidden');
  play(idx);
}

function showList() {
  overlay.classList.remove('hidden');
  var activeBtn = buttons[current];
  if (activeBtn) activeBtn.scrollIntoView({ block: 'center' });
}
